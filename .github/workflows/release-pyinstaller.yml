name: Release PyInstaller

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (windows-latest)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install UPX
        shell: pwsh
        run: |
          choco install upx -y --no-progress
          upx --version

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir --name "1c-comment-hotkeys" --paths "src" --icon "src/resources/icon.ico" "src/app.py"

      - name: Slim runtime payload
        shell: pwsh
        run: |
          $distDir = "dist/1c-comment-hotkeys"
          $pluginsDir = Join-Path $distDir "PySide6/plugins"
          $translationsDir = Join-Path $distDir "PySide6/translations"

          Write-Host "Size before slimming:"
          (Get-ChildItem $distDir -Recurse -File | Measure-Object Length -Sum).Sum

          if (Test-Path $pluginsDir) {
            $keepPluginDirs = @("platforms", "styles", "imageformats", "iconengines")
            Get-ChildItem $pluginsDir -Directory | ForEach-Object {
              if ($keepPluginDirs -notcontains $_.Name) {
                Remove-Item $_.FullName -Recurse -Force
              }
            }

            $platformsDir = Join-Path $pluginsDir "platforms"
            if (Test-Path $platformsDir) {
              Get-ChildItem $platformsDir -File | Where-Object { $_.Name -ne "qwindows.dll" } | Remove-Item -Force
            }
          }

          if (Test-Path $translationsDir) {
            Remove-Item $translationsDir -Recurse -Force
          }

          Get-ChildItem $distDir -Recurse -Directory -Filter "__pycache__" | Remove-Item -Recurse -Force

          Write-Host "Size after slimming:"
          (Get-ChildItem $distDir -Recurse -File | Measure-Object Length -Sum).Sum

      - name: Pack artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/1c-comment-hotkeys/*" -DestinationPath "1c-comment-hotkeys-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: 1c-comment-hotkeys-windows.zip

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/release-windows/1c-comment-hotkeys-windows.zip
